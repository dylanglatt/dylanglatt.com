<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Dylan Glatt{% endblock %}</title>
  <meta name="description" content="{% block description %}Dylan Glatt — builder and operator. Products, systems, and work.{% endblock %}">

  <!-- Open Graph -->
  <meta property="og:title"       content="{% block og_title %}Dylan Glatt{% endblock %}">
  <meta property="og:description" content="{% block og_description %}Builder. Products and systems.{% endblock %}">
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://dylanglatt.com{{ request.path }}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  {% block head %}{% endblock %}
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="{{ url_for('index') }}" class="nav-brand">Dylan Glatt</a>
      <div class="nav-links">
        <a href="{{ url_for('work') }}"    class="nav-link {% if request.endpoint in ('work','work_riffd') %}active{% endif %}">Work</a>
        <a href="{{ url_for('about') }}"   class="nav-link {% if request.endpoint == 'about' %}active{% endif %}">About</a>
        <a href="{{ url_for('contact') }}" class="nav-link {% if request.endpoint == 'contact' %}active{% endif %}">Contact</a>
      </div>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-links">
          <a href="https://github.com/djglatt"           target="_blank" rel="noopener">GitHub</a>
          <a href="https://linkedin.com/in/dylanglatt"   target="_blank" rel="noopener">LinkedIn</a>
          <a href="mailto:dylanglatt@gmail.com">Email</a>
          <a href="{{ url_for('static', filename='resume.pdf') }}" target="_blank">Resume</a>
        </div>
        <span class="footer-copy">© 2026 Dylan Glatt</span>
      </div>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
