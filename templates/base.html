<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Dylan Glatt{% endblock %}</title>
  <meta name="description" content="{% block description %}Dylan Glatt — I find problems that don't have good solutions yet, and I build them. Quantitative background, full-stack execution, and the ability to explain both to anyone in the room.{% endblock %}">

  <!-- Open Graph -->
  <meta property="og:title"       content="{% block og_title %}Dylan Glatt{% endblock %}">
  <meta property="og:description" content="{% block og_description %}I find problems that don't have good solutions yet, and I build them. Quantitative background, full-stack execution, and the ability to explain both to anyone in the room.{% endblock %}">
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://dylanglatt.com{{ request.path }}">
  <meta property="og:image"       content="https://dylanglatt.com{{ url_for('static', filename='img/og-image.png') }}">
  <meta name="twitter:card"       content="summary_large_image">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  {% block head %}{% endblock %}
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <div></div>
      <div class="nav-links" id="nav-links">
        <a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">Home</a>
        <a href="{{ url_for('about') }}" class="nav-link {% if request.endpoint == 'about' %}active{% endif %}">About Me</a>
      </div>
      <div class="nav-clock" id="hero-timestamp">New York · <span id="hero-clock"></span></div>
      <button class="nav-hamburger" id="nav-hamburger" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-links">
          <a href="https://github.com/dylanglatt"              target="_blank" rel="noopener">GitHub</a>
          <a href="https://www.linkedin.com/in/dylanjglatt/" target="_blank" rel="noopener">LinkedIn</a>
          <a href="#" class="email-link" data-u="dylanglatt" data-d="gmail.com">Email</a>
        </div>
        <span class="footer-copy">&copy; 2026 Dylan Glatt</span>
      </div>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
