<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ops — dylanglatt.com</title>
  <meta name="robots" content="noindex, nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body class="ops-body">

  <div class="ops-login-page">
    <div class="ops-login-box">

      <p class="ops-login-title">dylanglatt.com / ops</p>

      <form method="POST" action="{{ url_for('ops_login') }}">
        <div class="ops-form-group">
          <label for="username" class="ops-form-label">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            class="ops-form-input"
            autocomplete="username"
            autofocus
          >
        </div>

        <div class="ops-form-group">
          <label for="password" class="ops-form-label">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            class="ops-form-input"
            autocomplete="current-password"
          >
        </div>

        {% if error %}
          <p class="ops-form-error">Invalid credentials.</p>
        {% endif %}

        <button type="submit" class="ops-submit">Sign in</button>
      </form>

    </div>
  </div>

</body>
</html>
