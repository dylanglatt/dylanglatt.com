<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Preview — Dylan Glatt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #04061c; font-family: 'Inter', -apple-system, sans-serif; }

    .hero {
      position: relative;
      width: 100%;
      overflow: hidden;
    }
    #hero-canvas {
      display: block;
      width: 100%;
      height: auto;
      image-rendering: pixelated;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(4,6,28,0.0) 0%,
        rgba(4,6,28,0.0) 50%,
        rgba(4,6,28,0.75) 78%,
        rgba(4,6,28,1.0)  100%
      );
    }
    .hero-content {
      position: absolute;
      bottom: 10%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      width: 100%;
      padding: 0 2rem;
    }
    .hero-name {
      font-size: clamp(2.8rem, 6vw, 5.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #ffffff;
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    .hero-sub {
      font-size: clamp(0.75rem, 1.2vw, 0.9rem);
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 400;
      margin-bottom: 1.75rem;
    }
    .hero-links {
      display: flex;
      gap: 2.5rem;
      justify-content: center;
    }
    .hero-links a {
      color: rgba(255,255,255,0.65);
      text-decoration: none;
      font-size: 0.875rem;
      letter-spacing: 0.01em;
      transition: color 120ms ease;
    }
    .hero-links a:hover { color: #fff; }
    .hero-links a::after { content: ' →'; }

    .nav {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2.5rem;
      z-index: 10;
    }
    .nav-brand {
      color: rgba(255,255,255,0.85);
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      letter-spacing: -0.01em;
    }
    .nav-links { display: flex; gap: 2rem; }
    .nav-links a {
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 120ms ease;
    }
    .nav-links a:hover { color: rgba(255,255,255,0.85); }

    .body-section {
      background: #FAFAFA;
      padding: 4rem 2rem 5rem;
      text-align: center;
    }
    .body-label {
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 0.85rem;
    }
    .body-text {
      max-width: 500px;
      margin: 0 auto;
      font-size: 1rem;
      color: #555;
      line-height: 1.72;
    }
  </style>
</head>
<body>

  <div class="hero">
    <canvas id="hero-canvas"></canvas>
    <div class="hero-overlay"></div>

    <nav class="nav">
      <a href="#" class="nav-brand">Dylan Glatt</a>
      <div class="nav-links">
        <a href="#">Work</a>
        <a href="#">About</a>
      </div>
    </nav>

    <div class="hero-content">
      <h1 class="hero-name">Dylan Glatt</h1>
      <p class="hero-sub">Builder &amp; Operator</p>
      <div class="hero-links">
        <a href="#">See my work</a>
        <a href="#">About me</a>
      </div>
    </div>
  </div>

  <div class="body-section">
    <p class="body-label">Currently</p>
    <p class="body-text">
      Shipping Riffd — a music analysis tool for musicians. Also building a
      conflict event tracker on ACLED data, and some private tools for market intelligence.
    </p>
  </div>

  <script>
(function () {
  const PIXEL = 10;
  const COLS  = 144;
  const ROWS  = 52;

  const C = {
    void:'#04061c',space1:'#07103a',space2:'#0c1a56',space3:'#122272',
    blue1:'#1a3090',blue2:'#2240ae',moonCore:'#090f28',moonMid:'#0f1a48',
    moonRim:'#192c78',moonEdge:'#2240ae',gold:'#c08808',goldMid:'#e0aa18',
    goldBrt:'#f4cc38',starWht:'#fff6d8',orng1:'#c03808',orng2:'#e05018',
    orng3:'#f07030',orng4:'#f09848',amber:'#e8b820',red:'#c01010',
    flame1:'#e02000',flame2:'#f04810',grn1:'#185228',grn2:'#24703a',
    grn3:'#389050',grn4:'#58b468',yel1:'#c0a808',yel2:'#dcc018',
    violet:'#2818a8',purple:'#5818c0',magenta:'#c01898',
  };

  const dist = (x1,y1,x2,y2) => Math.sqrt((x2-x1)**2+(y2-y1)**2);
  let _seed = 31337;
  const rand = () => { _seed=(_seed*1664525+1013904223)&0x7fffffff; return _seed/0x7fffffff; };

  const grid  = Array.from({length:ROWS},()=>new Array(COLS).fill(C.void));
  const stars = [];
  const set   = (x,y,c) => { if(x>=0&&x<COLS&&y>=0&&y<ROWS) grid[y][x]=c; };

  // Sky
  const skyRows = Math.floor(ROWS*0.72);
  for(let y=0;y<skyRows;y++){
    const t=y/skyRows;
    const c=t<0.12?C.void:t<0.28?C.space1:t<0.44?C.space2:t<0.60?C.space3:t<0.78?C.blue1:C.blue2;
    for(let x=0;x<COLS;x++) grid[y][x]=c;
  }

  // Moon
  const mx=36,my=22,mr=18;
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++){
    const d=dist(x,y,mx,my);
    if(d<mr){const t=d/mr;set(x,y,t<0.20?C.moonCore:t<0.45?C.moonMid:t<0.72?C.moonRim:C.moonEdge);}
  }

  // Stars
  for(let i=0;i<220;i++){
    const x=Math.floor(rand()*COLS),y=Math.floor(rand()*skyRows);
    if(dist(x,y,mx,my)>mr+1){
      const r=rand(),col=r>0.75?C.starWht:r>0.45?C.goldBrt:C.goldMid,alt=rand()>0.5?C.void:C.space1;
      set(x,y,col);stars.push({x,y,col,alt,phase:rand()*Math.PI*2});
    }
  }

  // Big 4-pointed stars
  [[10,6],[24,16],[52,5],[68,13],[98,8],[112,21],[130,6],[14,38],[46,33],[88,36],[126,38],[58,46],[138,28],[80,10],[20,28]]
    .forEach(([sx,sy])=>{set(sx,sy,C.goldBrt);set(sx+1,sy,C.goldMid);set(sx-1,sy,C.goldMid);set(sx,sy+1,C.goldMid);set(sx,sy-1,C.goldMid);});

  // Rainbow bands
  const bands=[C.red,C.orng3,C.goldBrt,C.grn3,C.blue2,C.violet,C.purple,C.magenta];
  for(let y=18;y<46;y++) for(let x=58;x<COLS;x++){
    if(!(y>22&&y<44&&x>62)) continue;
    const idx=Math.floor(((x-y*0.6)%(bands.length*5)+bands.length*5)/5)%bands.length;
    set(x,y,bands[idx]);
  }

  // Angel
  const ax=74,ay=26;
  for(let y=ay;y<ay+13;y++) for(let x=ax-2;x<=ax+2;x++){const t=(y-ay)/13;set(x,y,t<0.3?C.orng4:t<0.65?C.orng3:C.orng2);}
  for(let dy=-5;dy<=0;dy++) for(let dx=-3;dx<=3;dx++){if(dist(dx,dy,0,-2)<3.8)set(ax+dx,ay+dy,C.orng4);}
  for(let dx=-5;dx<=5;dx++){set(ax+dx,ay-6,C.goldBrt);set(ax+dx,ay-7,C.goldMid);}
  for(let i=0;i<22;i++){
    const wy=ay+2+Math.floor(i*0.35),col=i<7?C.amber:i<14?C.goldMid:C.goldBrt,top=i<10?C.orng4:C.goldBrt;
    set(ax-3-i,wy,col);set(ax-3-i,wy-1,top);set(ax+3+i,wy,col);set(ax+3+i,wy-1,top);
  }
  for(let i=16;i<22;i++){set(ax-3-i,ay+3+Math.floor((i-15)*0.7),C.goldMid);set(ax+3+i,ay+3+Math.floor((i-15)*0.7),C.goldMid);}

  // Landscape
  const hillY=x=>Math.floor(ROWS*0.73+Math.sin(x*0.07)*3+Math.sin(x*0.17+1.4)*2+Math.sin(x*0.04+0.9)*1.5);
  for(let x=0;x<COLS;x++){
    const base=hillY(x);
    for(let y=base;y<ROWS;y++){const d=y-base;set(x,y,d===0?C.grn4:d<2?C.grn3:d<5?C.grn2:C.grn1);}
    if(x>82&&(x%4)<2){set(x,base,C.yel2);set(x,base+1,C.yel1);}
  }

  // Flames
  for(let x=0;x<COLS;x++){
    const base=hillY(x),fh=Math.floor(2+Math.sin(x*0.28)*1.5+Math.sin(x*0.43+1.2)*1);
    if((x+Math.floor(Math.abs(Math.sin(x*0.31))*4))%6>=4) continue;
    for(let fy=base-fh;fy<base;fy++){const t=(fy-(base-fh))/fh;set(x,fy,t<0.3?C.goldBrt:t<0.6?C.orng3:C.flame2);}
  }

  // Render
  const canvas=document.getElementById('hero-canvas');
  canvas.width=COLS*PIXEL; canvas.height=ROWS*PIXEL;
  const ctx=canvas.getContext('2d');
  (function frame(t){
    for(const s of stars){const v=Math.sin(t*0.0012+s.phase);grid[s.y][s.x]=v>0.35?C.starWht:v>-0.15?s.col:s.alt;}
    for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++){ctx.fillStyle=grid[y][x];ctx.fillRect(x*PIXEL,y*PIXEL,PIXEL,PIXEL);}
    requestAnimationFrame(frame);
  })(0);
})();
  </script>
</body>
</html>
