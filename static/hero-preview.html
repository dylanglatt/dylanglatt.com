<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Preview — Dylan Glatt</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #04061c; font-family: 'Inter', -apple-system, sans-serif; }

    .hero {
      position: relative;
      width: 100%;
      overflow: hidden;
    }
    #hero-canvas {
      display: block;
      width: 100%;
      height: auto;
      image-rendering: pixelated;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(4,6,28,0.0) 0%,
        rgba(4,6,28,0.0) 55%,
        rgba(4,6,28,0.7) 80%,
        rgba(4,6,28,1.0) 100%
      );
    }
    .hero-content {
      position: absolute;
      bottom: 10%;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      color: #fff;
      width: 100%;
      padding: 0 2rem;
    }
    .hero-name {
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #ffffff;
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    .hero-sub {
      font-size: clamp(0.9rem, 1.5vw, 1.1rem);
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 400;
      margin-bottom: 2rem;
    }
    .hero-links {
      display: flex;
      gap: 2rem;
      justify-content: center;
    }
    .hero-links a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 0.02em;
      transition: color 120ms ease;
    }
    .hero-links a:hover { color: #fff; }
    .hero-links a::after { content: ' →'; }

    /* Nav */
    .nav {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2.5rem;
      z-index: 10;
    }
    .nav-brand {
      color: rgba(255,255,255,0.9);
      font-size: 0.95rem;
      font-weight: 500;
      text-decoration: none;
      letter-spacing: -0.01em;
    }
    .nav-links { display: flex; gap: 2rem; }
    .nav-links a {
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      font-size: 0.875rem;
      transition: color 120ms ease;
    }
    .nav-links a:hover { color: rgba(255,255,255,0.9); }

    /* Body section (shows how the transition looks) */
    .body-section {
      background: #FAFAFA;
      padding: 4rem 2rem;
      text-align: center;
      color: #111;
    }
    .body-section p {
      max-width: 520px;
      margin: 0 auto;
      font-size: 1rem;
      color: #555;
      line-height: 1.7;
    }
    .body-section .label {
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 0.75rem;
    }
  </style>
</head>
<body>

  <div class="hero">
    <canvas id="hero-canvas"></canvas>
    <div class="hero-overlay"></div>

    <nav class="nav">
      <a href="#" class="nav-brand">Dylan Glatt</a>
      <div class="nav-links">
        <a href="#">Work</a>
        <a href="#">About</a>
      </div>
    </nav>

    <div class="hero-content">
      <h1 class="hero-name">Dylan Glatt</h1>
      <p class="hero-sub">Builder &amp; Operator</p>
      <div class="hero-links">
        <a href="#">See my work</a>
        <a href="#">About me</a>
      </div>
    </div>
  </div>

  <div class="body-section">
    <p class="label">Currently</p>
    <p>
      Shipping Riffd — a music analysis tool for musicians. Also building a
      conflict event tracker on ACLED data, and some private tools for market intelligence.
    </p>
  </div>

  <script src="/static/js/hero-pixel.js"></script>
  <script>
    HeroPixel.init(document.getElementById('hero-canvas'));
  </script>
</body>
</html>
